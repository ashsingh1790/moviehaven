name: PR Labels

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  pull_request_review:
    types: [submitted]

permissions:
  issues: write
  pull-requests: write

jobs:
  label-in-review:
    name: Mark linked issue as in-review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    steps:
      - name: Add status:review to linked issues
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const matches = body.matchAll(/(?:closes?|fixes?|resolves?)\s+#(\d+)/gi);
            for (const match of matches) {
              const issueNumber = parseInt(match[1]);
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: ['status:review'],
              });
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                name: 'status:in-progress',
              }).catch(() => {}); // ignore if label not present
            }

  approve-label:
    name: Mark issue done on approved review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_review' && github.event.review.state == 'approved'
    steps:
      - name: Add status:done to linked issues on approval
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });
            const body = pr.body || '';
            const matches = body.matchAll(/(?:closes?|fixes?|resolves?)\s+#(\d+)/gi);
            for (const match of matches) {
              const issueNumber = parseInt(match[1]);
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: ['status:done'],
              });
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                name: 'status:review',
              }).catch(() => {});
            }
